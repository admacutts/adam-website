<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Garden spade: shaft, pointed crest, inverted-shield blade, twin bottom points -->
  <g fill="#0047AB">
    <!-- handle shaft -->
    <rect x="7" y="0" width="2" height="2"/>
    <!-- pointed crest -->
    <rect x="7" y="2" width="2" height="1"/>
    <rect x="7" y="3" width="1" height="1"/>
    <rect x="6" y="4" width="4" height="1"/>
    <rect x="5" y="5" width="6" height="1"/>
    <!-- inverted-shield body -->
    <rect x="4" y="6" width="8" height="1"/>
    <rect x="3" y="7" width="10" height="3"/>
    <rect x="4" y="10" width="8" height="1"/>
    <rect x="5" y="11" width="6" height="1"/>
    <!-- twin bottom points -->
    <rect x="5" y="12" width="2" height="1"/>
    <rect x="9" y="12" width="2" height="1"/>
    <rect x="4" y="13" width="2" height="2"/>
    <rect x="10" y="13" width="2" height="2"/>
  </g>
</svg>
